
# ── Aurora v3.6 Network Tuning (Speed-test proof) ──────────────────
# BBR congestion control (2-3x faster than Cubic on lossy links)
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# v3.6: TCP buffers reduced to 2MB max (was 4MB in v3.5).
# Speed test sites open 6-32 parallel connections per user.
# With 100 users: 100 × 16 connections × 2MB = 3.2GB (was 6.4GB at 4MB)
# 2MB is enough for 50Mbps links with 300ms RTT (covers most Iran use cases).
net.ipv4.tcp_rmem=4096 16384 2097152
net.ipv4.tcp_wmem=4096 16384 2097152
net.core.rmem_max=2097152
net.core.wmem_max=2097152
net.core.rmem_default=32768
net.core.wmem_default=32768
net.core.netdev_max_backlog=500

# Disable slow-start-after-idle (keep window open for keepalive connections)
net.ipv4.tcp_slow_start_after_idle=0

# Enable MTU probing (fixes black-hole MTU issues)
net.ipv4.tcp_mtu_probing=1

# TCP Fast Open (server-side, reduces 1 RTT on reconnect)
net.ipv4.tcp_fastopen=3

# Keepalive tuning (faster detection of dead connections)
net.ipv4.tcp_keepalive_time=600
net.ipv4.tcp_keepalive_intvl=15
net.ipv4.tcp_keepalive_probes=5

# v3.6: Reduced backlog further (was 1024, now 512)
net.core.somaxconn=512
net.ipv4.tcp_max_syn_backlog=512

# v3.6: Recycle FIN-WAIT connections faster to free RAM
net.ipv4.tcp_fin_timeout=15
net.ipv4.tcp_tw_reuse=1

# Disable IPv6 (avoid AAAA delays when IPv6 is broken)
net.ipv6.conf.all.disable_ipv6=1
net.ipv6.conf.default.disable_ipv6=1
# ── End Network Tuning ──────────────────────────────────
